- description: "t001"
  vars:
    ticket: "I was charged twice for my March subscription. Need a refund ASAP."
  assert:
    - type: is-json
    - type: javascript
      value: JSON.parse(output).category === "billing"
    - type: javascript
      value: JSON.parse(output).urgency === "high"
- description: "t002"
  vars:
    ticket: "How do I change my display name in the profile settings?"
  assert:
    - type: is-json
    - type: javascript
      value: JSON.parse(output).category === "account"
    - type: javascript
      value: JSON.parse(output).urgency === "low"
- description: "t003"
  vars:
    ticket: "The export to CSV button does nothing when I click it."
  assert:
    - type: is-json
    - type: javascript
      value: JSON.parse(output).category === "technical"
    - type: javascript
      value: JSON.parse(output).urgency === "medium"
- description: "t004"
  vars:
    ticket: "It would be great if you could add dark mode to the mobile app."
  assert:
