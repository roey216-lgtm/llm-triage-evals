    - type: javascript
      value: JSON.parse(output).category === "feature_request"
    - type: javascript
      value: JSON.parse(output).urgency === "low"
- description: "t005"
  vars:
    ticket: "Your product is a complete waste of money. Three weeks and nothing works. Cancelling."
  assert:
